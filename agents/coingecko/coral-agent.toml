edition = 3

[agent]
name = "solana-coingecko"
version = "0.1.0"
description = "CoinGecko on-chain API — token prices, DEX pool data across 1,700+ DEXes and 15M+ tokens, OHLCV charts, trade history, and market analytics for Solana."

readme = "CoinGecko on-chain API — token prices, DEX pool data across 1,700+ DEXes and 15M+ tokens, OHLCV charts, trade history, and market analytics for Solana."
summary = "CoinGecko on-chain API — token prices, DEX pool data across 1,700+ DEXes and 15M+ tokens, OHLCV charts, trade history, and market analytics for Solana."

[agent.license]
type = "sdpx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
