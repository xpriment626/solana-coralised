edition = 3

[agent]
name = "solana-quicknode"
version = "0.1.0"
description = "QuickNode infrastructure — multi-chain RPC (80+ chains), DAS API, Yellowstone gRPC streaming, Priority Fee API, Streams, Webhooks, Metis Jupiter Swap, IPFS, Key-Value Store, and x402 pay-per-request."

readme = "QuickNode infrastructure — multi-chain RPC (80+ chains), DAS API, Yellowstone gRPC streaming, Priority Fee API, Streams, Webhooks, Metis Jupiter Swap, IPFS, Key-Value Store, and x402 pay-per-request."
summary = "QuickNode infrastructure — multi-chain RPC (80+ chains), DAS API, Yellowstone gRPC streaming, Priority Fee API, Streams, Webhooks, Metis Jupiter Swap, IPFS, Key-Value Store, and x402 pay-per-request."

[agent.license]
type = "sdpx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
