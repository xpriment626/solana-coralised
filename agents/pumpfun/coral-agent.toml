edition = 3

[agent]
name = "solana-pumpfun"
version = "0.1.0"
description = "PumpFun Protocol — bonding curve token launches, buy/sell operations, PumpSwap AMM post-graduation, creator fees, Token2022 support, and Mayhem mode on Solana."

readme = "PumpFun Protocol — bonding curve token launches, buy/sell operations, PumpSwap AMM post-graduation, creator fees, Token2022 support, and Mayhem mode on Solana."
summary = "PumpFun Protocol — bonding curve token launches, buy/sell operations, PumpSwap AMM post-graduation, creator fees, Token2022 support, and Mayhem mode on Solana."

