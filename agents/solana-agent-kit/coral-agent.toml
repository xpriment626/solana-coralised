edition = 3

[agent]
name = "solana-agent-kit"
version = "0.1.0"
description = "SendAI Solana Agent Kit — 60+ blockchain actions via plugin architecture (Token, NFT, DeFi, Misc, Blinks), LangChain/Vercel AI integration, MCP server, and embedded wallet support."

readme = "SendAI Solana Agent Kit — 60+ blockchain actions via plugin architecture (Token, NFT, DeFi, Misc, Blinks), LangChain/Vercel AI integration, MCP server, and embedded wallet support."
summary = "SendAI Solana Agent Kit — 60+ blockchain actions via plugin architecture (Token, NFT, DeFi, Misc, Blinks), LangChain/Vercel AI integration, MCP server, and embedded wallet support."

[agent.license]
type = "sdpx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
