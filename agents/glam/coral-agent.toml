edition = 3

[agent]
name = "solana-glam"
version = "0.1.0"
description = "GLAM Protocol — tokenised vault management, share classes, Jupiter swaps, Kamino lending, staking (Marinade/Sanctum/LST), CCTP cross-chain USDC, timelock, and NAV pricing on Solana."

readme = "GLAM Protocol — tokenised vault management, share classes, Jupiter swaps, Kamino lending, staking (Marinade/Sanctum/LST), CCTP cross-chain USDC, timelock, and NAV pricing on Solana."
summary = "GLAM Protocol — tokenised vault management, share classes, Jupiter swaps, Kamino lending, staking (Marinade/Sanctum/LST), CCTP cross-chain USDC, timelock, and NAV pricing on Solana."

[agent.license]
type = "sdpx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
