edition = 3

[agent]
name = "solana-metaplex"
version = "0.1.0"
description = "Metaplex Protocol — Core NFTs, Token Metadata, Bubblegum cNFTs, Candy Machine, Genesis token launches, MPL-Hybrid, Inscriptions, DAS API, and the Umi framework on Solana."

readme = "Metaplex Protocol — Core NFTs, Token Metadata, Bubblegum cNFTs, Candy Machine, Genesis token launches, MPL-Hybrid, Inscriptions, DAS API, and the Umi framework on Solana."
summary = "Metaplex Protocol — Core NFTs, Token Metadata, Bubblegum cNFTs, Candy Machine, Genesis token launches, MPL-Hybrid, Inscriptions, DAS API, and the Umi framework on Solana."

[agent.license]
type = "sdpx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
