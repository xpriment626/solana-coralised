edition = 3

[agent]
name = "solana-helius"
version = "0.1.0"
description = "Helius infrastructure — smart tx submission (Sender), DAS API for NFTs/assets, LaserStream gRPC, WebSocket streaming, webhooks, priority fees, wallet analysis, and MCP server on Solana."

readme = "Helius infrastructure — smart tx submission (Sender), DAS API for NFTs/assets, LaserStream gRPC, WebSocket streaming, webhooks, priority fees, wallet analysis, and MCP server on Solana."
summary = "Helius infrastructure — smart tx submission (Sender), DAS API for NFTs/assets, LaserStream gRPC, WebSocket streaming, webhooks, priority fees, wallet analysis, and MCP server on Solana."

[agent.license]
