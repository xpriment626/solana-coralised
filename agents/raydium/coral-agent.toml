edition = 3

[agent]
name = "solana-raydium"
version = "0.1.0"
description = "Raydium Protocol — Trade API, CLMM and CPMM pool operations, AMM V4, LaunchLab token launches, farming/staking, CPI integration, and liquidity management on Solana."

readme = "Raydium Protocol — Trade API, CLMM and CPMM pool operations, AMM V4, LaunchLab token launches, farming/staking, CPI integration, and liquidity management on Solana."
summary = "Raydium Protocol — Trade API, CLMM and CPMM pool operations, AMM V4, LaunchLab token launches, farming/staking, CPI integration, and liquidity management on Solana."

[agent.license]
type = "sdpx"
expression = "MIT"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"

[options.OPENAI_API_KEY]
type = "string"
required = true
secret = true

[options.OPENAI_API_KEY.display]
description = "OpenAI API key for gpt-5.4-mini"
